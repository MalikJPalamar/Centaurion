services:
  - type: web
    name: centaurion
    env: python
    buildCommand: |
      cd backend && pip install -r requirements.txt
      cd frontend && npm install && npm run build
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: "8000"
      - key: PYTHON_VERSION
        value: "3.11"
    repo: https://github.com/MalikJPalamar/Centaurion
