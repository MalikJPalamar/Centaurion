services:
  - type: web
    name: centaurion-backend
    env: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: "8000"
      - key: PYTHON_VERSION
        value: "3.11"
    repo: https://github.com/MalikJPalamar/Centaurion

  - type: web
    name: centaurion-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublish: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://centaurion-backend.onrender.com
    repo: https://github.com/MalikJPalamar/Centaurion
