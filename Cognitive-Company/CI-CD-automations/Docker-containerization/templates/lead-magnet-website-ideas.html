<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Ideas Generator - The Cognitive Company</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #fff; padding: 2rem; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: rgba(255,255,255,0.05); border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); padding: 2rem; margin-bottom: 1.5rem; }
        h1 { font-size: 2.5rem; background: linear-gradient(90deg, #00d4ff, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 0.5rem; }
        .subtitle { text-align: center; color: #94a3b8; margin-bottom: 2rem; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        select { width: 100%; padding: 0.75rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 1rem; }
        .btn { display: inline-block; padding: 1rem 2rem; background: linear-gradient(90deg, #00d4ff, #7c3aed); border-radius: 8px; color: white; text-decoration: none; font-weight: 600; border: none; cursor: pointer; font-size: 1rem; width: 100%; }
        .btn:hover { transform: scale(1.02); }
        .results { display: none; }
        .idea-card { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid rgba(255,255,255,0.1); }
        .idea-card h3 { color: #00d4ff; margin-bottom: 0.5rem; }
        .idea-card .url { color: #7c3aed; font-size: 0.9rem; margin-bottom: 0.5rem; }
        .idea-card p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 0.5rem; }
        .features { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
        .feature { background: rgba(0,212,255,0.1); padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.75rem; color: #00d4ff; }
        .color-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 0.5rem; vertical-align: middle; }
        .email-capture { margin-top: 2rem; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1); }
        .email-capture input { width: 100%; padding: 0.75rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Website Ideas Generator</h1>
            <p class="subtitle">Get unique website concepts tailored to your business</p>
            <div class="form-row">
                <select id="industry"><option value="">Select Industry</option><option value="tech">Technology</option><option value="healthcare">Healthcare</option><option value="education">Education</option><option value="ecommerce">E-commerce</option><option value="finance">Finance</option><option value="realestate">Real Estate</option><option value="food">Food & Beverage</option><option value="fitness">Fitness</option><option value="fashion">Fashion</option><option value="travel">Travel</option></select>
                <select id="businessType"><option value="">Business Type</option><option value="b2b">B2B</option><option value="b2c">B2C</option><option value="saas">SaaS</option><option value="service">Service</option><option value="startup">Startup</option><option value="agency">Agency</option></select>
                <select id="audience"><option value="">Target Audience</option><option value="professionals">Professionals</option><option value="millennials">Millennials</option><option value="genz">Gen Z</option><option value="entrepreneurs">Entrepreneurs</option><option value="students">Students</option></select>
            </div>
            <button class="btn" onclick="generateIdeas()">Generate Ideas</button>
        </div>
        <div class="results" id="results">
            <div class="card">
                <h2 style="margin-bottom: 1rem;">Your Website Ideas</h2>
                <div id="ideas"></div>
            </div>
            <div class="card email-capture">
                <p style="margin-bottom: 1rem; color: #94a3b8;">Get these ideas delivered to your inbox</p>
                <input type="email" placeholder="Enter your email">
                <button class="btn">Send Me These Ideas</button>
            </div>
        </div>
    </div>
    <script>
        const ideas = {
            tech: { name: 'TechFlow', colors: ['#00d4ff', '#7c3aed'], features: ['SaaS Dashboard', 'API Docs', 'Pricing Tables'] },
            healthcare: { name: 'HealthHub', colors: ['#10b981', '#059669'], features: ['Appointment Booking', 'Patient Portal', 'Insurance Verification'] },
            education: { name: 'LearnPath', colors: ['#f59e0b', '#d97706'], features: ['Course Builder', 'Progress Tracking', 'Certificate Generator'] },
            ecommerce: { name: 'ShopNova', colors: ['#ec4899', '#db2777'], features: ['Product Gallery', 'Cart System', 'Payment Integration'] },
            finance: { name: 'FinancePro', colors: ['#22c55e', '#16a34a'], features: ['Investment Tracker', 'Budget Planner', 'Report Generator'] },
            default: { name: 'BrandX', colors: ['#00d4ff', '#7c3aed'], features: ['Modern Design', 'Contact Form', 'About Page'] }
        };
        function generateIdeas() {
            const industry = document.getElementById('industry').value || 'default';
            const data = ideas[industry] || ideas.default;
            const types = ['Landing Page', 'Web App', 'Membership Site', 'E-commerce', 'Portfolio'];
            let html = '';
            types.forEach((type, i) => {
                html += `<div class="idea-card"><h3>${data.name} ${type}</h3><div class="url">${data.name.toLowerCase()}${type.replace(/\s/g,'')}.com</div><p>Perfect for ${industry} businesses targeting your audience. Modern, conversion-focused design.</p><div class="features"><span class="feature" style="background:${data.colors[0]}20;color:${data.colors[0]}">${type}</span>${data.features.map(f=>`<span class="feature">${f}</span>`).join('')}</div><div style="margin-top:0.5rem;"><span class="color-dot" style="background:${data.colors[0]}"></span><span class="color-dot" style="background:${data.colors[1]}"></span></div></div>`;
            });
            document.getElementById('ideas').innerHTML = html;
            document.getElementById('results').style.display = 'block';
        }
    </script>
</body>
</html>
