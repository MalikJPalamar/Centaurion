<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R&D Innovation Lab - The Cognitive Company</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #fff; padding: 2rem; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: rgba(255,255,255,0.05); border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); padding: 2rem; margin-bottom: 1.5rem; }
        h1 { font-size: 2.5rem; background: linear-gradient(90deg, #00d4ff, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 0.5rem; }
        .subtitle { text-align: center; color: #94a3b8; margin-bottom: 2rem; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        select { width: 100%; padding: 0.75rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 1rem; }
        .btn { display: inline-block; padding: 1rem 2rem; background: linear-gradient(90deg, #00d4ff, #7c3aed); border-radius: 8px; color: white; text-decoration: none; font-weight: 600; border: none; cursor: pointer; font-size: 1rem; width: 100%; }
        .results { display: none; }
        .project-card { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid rgba(255,255,255,0.1); }
        .project-card h3 { color: #00d4ff; margin-bottom: 0.5rem; }
        .project-card p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 1rem; }
        .tags { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .tag { background: rgba(255,255,255,0.1); padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.75rem; }
        .impact-high { color: #ef4444; } .impact-medium { color: #f59e0b; } .impact-low { color: #22c55e; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>R&D Innovation Lab</h1>
            <p class="subtitle">Generate breakthrough R&D project ideas for your organization</p>
            <div class="form-row">
                <select id="size"><option value="">Company Size</option><option value="startup">Startup</option><option value="small">Small (1-50)</option><option value="medium">Medium (51-500)</option><option value="large">Large (500+)</option><option value="enterprise">Enterprise</option></select>
                <select id="industry"><option value="">Industry</option><option value="tech">Technology</option><option value="healthcare">Healthcare</option><option value="finance">Finance</option><option value="manufacturing">Manufacturing</option><option value="retail">Retail</option><option value="energy">Energy</option></select>
                <select id="challenge"><option value="">Challenge</option><option value="efficiency">Efficiency</option><option value="experience">Customer Experience</option><option value="analytics">Data & Analytics</option><option value="automation">Process Automation</option><option value="innovation">Product Innovation</option><option value="growth">Market Growth</option></select>
            </div>
            <button class="btn" onclick="generateProjects()">Generate Projects</button>
        </div>
        <div class="results" id="results">
            <div class="card">
                <h2 style="margin-bottom:1rem;">Recommended R&D Projects</h2>
                <div id="projects"></div>
            </div>
        </div>
    </div>
    <script>
        const projects = [
            { title: 'AI-Powered Process Automation', problem: 'Streamline repetitive tasks', impact: 'High', resource: '3-5 engineers', timeline: '3-6 months', industries: ['tech', 'finance', 'manufacturing'] },
            { title: 'Predictive Analytics Dashboard', problem: 'Forecast trends accurately', impact: 'High', resource: '2-4 engineers', timeline: '2-4 months', industries: ['tech', 'retail', 'finance'] },
            { title: 'Computer Vision Quality Control', problem: 'Automate inspection', impact: 'High', resource: '4-6 engineers', timeline: '6-9 months', industries: ['manufacturing', 'tech'] },
            { title: 'NLP Customer Service Bot', problem: '24/7 support automation', impact: 'Medium', resource: '2-3 engineers', timeline: '3-4 months', industries: ['retail', 'tech', 'healthcare'] },
            { title: 'IoT Predictive Maintenance', problem: 'Reduce downtime', impact: 'High', resource: '3-5 engineers', timeline: '4-6 months', industries: ['manufacturing', 'energy'] }
        ];
        function generateProjects() {
            const industry = document.getElementById('industry').value;
            let filtered = projects;
            if(industry) filtered = projects.filter(p => p.industries.includes(industry) || p.industries.includes('tech'));
            let html = '';
            filtered.slice(0,5).forEach(p => {
                html += `<div class="project-card"><h3>${p.title}</h3><p>${p.problem}</p><div class="tags"><span class="tag impact-${p.impact.toLowerCase()}">${p.impact} Impact</span><span class="tag">${p.resource}</span><span class="tag">${p.timeline}</span></div></div>`;
            });
            document.getElementById('projects').innerHTML = html;
            document.getElementById('results').style.display = 'block';
        }
    </script>
</body>
</html>
