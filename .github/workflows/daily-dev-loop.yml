name: Daily Development Report

on:
  schedule:
    # 6:15am CEST (UTC+2) = 4:15am UTC
    # Runs AFTER the VPS1 dev loop (6am) to capture its results
    - cron: '15 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Phase 1 verification
        id: phase1
        continue-on-error: true
        run: |
          chmod +x tests/verify-core-loop.sh
          OUTPUT=$(bash tests/verify-core-loop.sh 2>&1) || true
          echo "pass=$(echo "$OUTPUT" | grep -c "  ✓" || true)" >> $GITHUB_OUTPUT
          echo "fail=$(echo "$OUTPUT" | grep -c "  ✗" || true)" >> $GITHUB_OUTPUT

      - name: Run Phase 2 verification
        id: phase2
        continue-on-error: true
        run: |
          chmod +x tests/verify-memory-integration.sh
          OUTPUT=$(bash tests/verify-memory-integration.sh 2>&1) || true
          echo "pass=$(echo "$OUTPUT" | grep -c "  ✓" || true)" >> $GITHUB_OUTPUT
          echo "fail=$(echo "$OUTPUT" | grep -c "  ✗" || true)" >> $GITHUB_OUTPUT

      - name: Run Phase 3 verification
        id: phase3
        continue-on-error: true
        run: |
          chmod +x tests/verify-multi-runtime.sh
          OUTPUT=$(bash tests/verify-multi-runtime.sh 2>&1) || true
          echo "pass=$(echo "$OUTPUT" | grep -c "  ✓" || true)" >> $GITHUB_OUTPUT
          echo "fail=$(echo "$OUTPUT" | grep -c "  ✗" || true)" >> $GITHUB_OUTPUT

      - name: Run Dev Loop self-test
        id: devloop
        continue-on-error: true
        run: |
          chmod +x tests/verify-dev-loop.sh
          OUTPUT=$(bash tests/verify-dev-loop.sh 2>&1) || true
          echo "pass=$(echo "$OUTPUT" | grep -c "  ✓" || true)" >> $GITHUB_OUTPUT
          echo "fail=$(echo "$OUTPUT" | grep -c "  ✗" || true)" >> $GITHUB_OUTPUT

      - name: Identify next priority
        id: priority
        run: |
          chmod +x tests/identify-next-priority.sh
          PRIORITY_JSON=$(bash tests/identify-next-priority.sh 2>/dev/null)
          echo "json<<PRIORITYEOF" >> $GITHUB_OUTPUT
          echo "$PRIORITY_JSON" >> $GITHUB_OUTPUT
          echo "PRIORITYEOF" >> $GITHUB_OUTPUT
          STATUS=$(echo "$PRIORITY_JSON" | grep -o '"status": *"[^"]*"' | head -1 | sed 's/.*: *"//;s/"//')
          PHASE=$(echo "$PRIORITY_JSON" | grep -o '"phase": *[0-9]*' | head -1 | sed 's/.*: *//')
          PHASE_NAME=$(echo "$PRIORITY_JSON" | grep -o '"phase_name": *"[^"]*"' | head -1 | sed 's/.*: *"//;s/"//')
          FIRST_FAIL=$(echo "$PRIORITY_JSON" | grep -o '"first_failure": *"[^"]*"' | head -1 | sed 's/.*: *"//;s/"//')
          TDD_RED=$(echo "$PRIORITY_JSON" | grep -o '"red": *"[^"]*"' | head -1 | sed 's/.*: *"//;s/"//')
          TDD_GREEN=$(echo "$PRIORITY_JSON" | grep -o '"green": *"[^"]*"' | head -1 | sed 's/.*: *"//;s/"//')
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "phase=$PHASE" >> $GITHUB_OUTPUT
          echo "phase_name=$PHASE_NAME" >> $GITHUB_OUTPUT
          echo "first_fail=$FIRST_FAIL" >> $GITHUB_OUTPUT
          echo "tdd_red=$TDD_RED" >> $GITHUB_OUTPUT
          echo "tdd_green=$TDD_GREEN" >> $GITHUB_OUTPUT

      - name: Create development report issue
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const phase = '${{ steps.priority.outputs.phase }}';
            const phaseName = '${{ steps.priority.outputs.phase_name }}';
            const status = '${{ steps.priority.outputs.status }}';

            const p1Pass = '${{ steps.phase1.outputs.pass }}';
            const p1Fail = '${{ steps.phase1.outputs.fail }}';
            const p2Pass = '${{ steps.phase2.outputs.pass }}';
            const p2Fail = '${{ steps.phase2.outputs.fail }}';
            const p3Pass = '${{ steps.phase3.outputs.pass }}';
            const p3Fail = '${{ steps.phase3.outputs.fail }}';
            const dlPass = '${{ steps.devloop.outputs.pass }}';
            const dlFail = '${{ steps.devloop.outputs.fail }}';

            const totalPass = parseInt(p1Pass||0) + parseInt(p2Pass||0) + parseInt(p3Pass||0) + parseInt(dlPass||0);
            const totalFail = parseInt(p1Fail||0) + parseInt(p2Fail||0) + parseInt(p3Fail||0) + parseInt(dlFail||0);

            const firstFail = `${{ steps.priority.outputs.first_fail }}`;
            const tddRed = `${{ steps.priority.outputs.tdd_red }}`;
            const tddGreen = `${{ steps.priority.outputs.tdd_green }}`;

            const title = `[dev-loop] ${date} — Phase ${phase}: ${phaseName}`;

            const body = [
              `## Daily Development Report — ${date}`,
              '',
              '### Test Suite Status',
              '| Phase | Pass | Fail | Status |',
              '|-------|------|------|--------|',
              `| Phase 1: Core Loop | ${p1Pass} | ${p1Fail} | ${parseInt(p1Fail||0) === 0 ? '✅' : '❌'} |`,
              `| Phase 2: Memory Integration | ${p2Pass} | ${p2Fail} | ${parseInt(p2Fail||0) === 0 ? '✅' : '⏳'} |`,
              `| Phase 3: Multi-Runtime | ${p3Pass} | ${p3Fail} | ${parseInt(p3Fail||0) === 0 ? '✅' : '⏳'} |`,
              `| Dev Loop Infrastructure | ${dlPass} | ${dlFail} | ${parseInt(dlFail||0) === 0 ? '✅' : '❌'} |`,
              `| **Total** | **${totalPass}** | **${totalFail}** | |`,
              '',
              '### Next Priority',
              `**Phase ${phase}: ${phaseName}**`,
              firstFail ? `First failing test: \`${firstFail}\`` : 'All current tests passing.',
              '',
              '### TDD Plan',
              '| Step | Action |',
              '|------|--------|',
              `| 🔴 Red | ${tddRed} |`,
              `| 🟢 Green | ${tddGreen} |`,
              '| 🔵 Refactor | Re-run full suite to check for regressions |',
              '',
              '### Architecture',
              '- **Development:** VPS1 cron → `claude -p` (Max subscription, 6:00am CET)',
              '- **Reporting:** GitHub Actions (this workflow, 6:15am CET)',
              '',
              '---',
              '*Centaurion daily dev loop — VPS1 develops, GitHub reports.*'
            ].join('\n');

            // Close older dev-loop issues
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'dev-loop',
              state: 'open'
            });
            for (const issue of existing.data) {
              if (issue.title.startsWith('[dev-loop]') && issue.title !== title) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                  state_reason: 'not_planned'
                });
              }
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['dev-loop', 'automated']
            });
