name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install flake8

      - name: Lint code
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          pytest --cov=. --cov-report=xml

  security-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Run security scan
        run: |
          pip install safety bandit
          safety check || true
          bandit -r . -x ./tests || true

  build:
    runs-on: ubuntu-latest
    needs: [lint, test, security-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./Cognitive-Company/CI-CD-automations/Docker-containerization
          push: false
          load: true
          tags: centaurion:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container health check
        run: |
          docker run -d --name centaurion-test -p 8000:8000 centaurion:latest
          sleep 5
          if curl -f http://localhost:8000 > /dev/null 2>&1; then
            echo "✅ Container health check passed"
          else
            echo "❌ Container health check failed"
            docker logs centaurion-test
            exit 1
          fi
          docker rm -f centaurion-test

  deploy-render:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Render
        run: |
          echo "✅ Push to main branch detected"
          echo "Render will auto-deploy from GitHub"
          echo "Check: https://dashboard.render.com"

      - name: Notify deployment
        run: |
          echo "Deployment triggered for commit: ${{ github.sha }}"
          echo "Visit https://centaurion.onrender.com to view"
