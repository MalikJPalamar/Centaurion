version: '3.8'

services:
  centaurion:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: centaurion
    environment:
      - API_KEYS=${API_KEYS}
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  monitoring:
    image: prom/prometheus:latest
    container_name: centaurion-monitoring
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  cron:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: centaurion-cron
    command: ["python", "cron.py"]
    environment:
      - SCHEDULE=${SCHEDULE}
